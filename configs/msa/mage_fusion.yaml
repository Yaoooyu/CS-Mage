method: MAGE-Fusion
data_root: ${CS_MAGE_DATA_ROOT}
split_root: splits/msa
seed: 20260715
protocol: sample-level fixed five-fold
fold_sizes: {train: 759, validation: 109, test: 217}
model:
  hidden_dim: 192
  encoder_dropout: 0.20
  evidence_dropout: 0.10
  head_dropout: 0.25
  head_dims: [192, 256, 128]
training:
  optimizer: AdamW
  learning_rate: 0.0006
  weight_decay: 0.0003
  full_batch: true
  max_epochs: 180
  patience: 30
  gradient_clip_norm: 4.0
  selection_score: Corr - MAE + 0.35 * Acc2
agreement:
  tau_t: 1.0
  lambda_ta: 0.01
  lambda_pa: 0.01
  attention_bias: true
  disagreement_expert: true
  modality_entropy_coefficient: 0.005
  expert_entropy_coefficient: 0.003
mixup:
  enabled: true
  beta_alpha: 0.35
  mode: truncated
  lambda: max(Beta(0.35, 0.35), 0.5)
output_dir: ${CS_MAGE_OUTPUT_ROOT}/mage_fusion
